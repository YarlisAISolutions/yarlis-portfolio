# ============================================================
# Yarlis Reusable Pipeline — called by all domain workflows
# Handles: install → lint → build → test → deploy
# Auth: OIDC → GCP Workload Identity (zero stored tokens)
# ============================================================

name: Yarlis Pipeline (Reusable)
on:
  workflow_call:
    inputs:
      domain:
        description: "Domain code (rtm, mbx, yai, sdo)"
        required: true
        type: string
      project_id:
        description: "GCP/Firebase project ID"
        required: true
        type: string
      node_version:
        description: "Node.js version"
        default: "20"
        type: string
      run_e2e:
        description: "Run E2E tests"
        default: true
        type: boolean
      deploy_staging:
        description: "Deploy to staging"
        default: true
        type: boolean
      deploy_prod:
        description: "Deploy to production (main branch only)"
        default: true
        type: boolean
      base_url_prod:
        description: "Production base URL for E2E"
        required: false
        type: string
      base_url_staging:
        description: "Staging base URL for E2E"
        required: false
        type: string

    secrets:
      WIF_PROVIDER:
        description: "GCP Workload Identity Provider"
        required: true
      WIF_SA:
        description: "GCP Service Account email"
        required: true

env:
  GCP_PROJECT: yarlis-platform
  VAULT_PROJECT: yarlis-platform

jobs:
  # ── 1. Install + Lint + Build ─────────────────────────────
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present || true

      - name: Typecheck
        run: npm run typecheck --if-present || true

      - name: Build
        run: npm run build

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: |
            dist/
            functions/lib/
            .next/
          key: build-${{ github.sha }}

  # ── 2. Test ───────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build
    if: inputs.run_e2e

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Fetch test token from Vault
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |
            test_token:yarlis-platform/ypid_${{ inputs.domain }}_prod_rapidtriage-api-token

      - name: E2E — API flows
        run: npx playwright test --project=api-flows --reporter=github
        env:
          RAPIDTRIAGE_BASE_URL: ${{ inputs.base_url_prod }}
          RAPIDTRIAGE_TEST_TOKEN: ${{ steps.secrets.outputs.test_token }}

      - name: E2E — UI flows
        run: npx playwright test --project=auth-flows --project=marketing-flows --reporter=github
        env:
          RAPIDTRIAGE_BASE_URL: ${{ inputs.base_url_prod }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ inputs.domain }}
          path: playwright-report/
          retention-days: 14

  # ── 3. Deploy Staging ────────────────────────────────────
  staging:
    name: 🚀 Staging
    runs-on: ubuntu-latest
    needs: [build, test]
    if: inputs.deploy_staging && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
    environment: staging

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - run: npm ci

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            dist/
            functions/lib/
          key: build-${{ github.sha }}

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Fetch staging secrets from Vault
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |
            firebase_token:yarlis-platform/ypid_${{ inputs.domain }}_staging_firebase-token

      - name: Deploy to staging channel
        run: |
          npx firebase-tools hosting:channel:deploy staging \
            --expires 7d \
            --project ${{ inputs.project_id }} \
            --token "${{ steps.secrets.outputs.firebase_token }}"

      - name: E2E vs Staging
        run: npx playwright test --project=api-flows --project=marketing-flows
        env:
          RAPIDTRIAGE_BASE_URL: ${{ inputs.base_url_staging }}
        continue-on-error: true

  # ── 4. Deploy Production ─────────────────────────────────
  production:
    name: 🌐 Production
    runs-on: ubuntu-latest
    needs: [staging]
    if: inputs.deploy_prod && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ inputs.base_url_prod }}

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
      - run: npm ci

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            dist/
            functions/lib/
          key: build-${{ github.sha }}

      - name: Authenticate to GCP (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}

      - name: Fetch prod secrets from Vault
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |
            firebase_token:yarlis-platform/ypid_${{ inputs.domain }}_prod_firebase-token
            npm_token:yarlis-platform/ypid_all_prod_npm-token

      - name: Deploy to production
        run: |
          npx firebase-tools deploy \
            --project ${{ inputs.project_id }} \
            --token "${{ steps.secrets.outputs.firebase_token }}"

      - name: Notify DEEJR
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && '✅' || '🔴' }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id=5764179434 \
            -d text="${STATUS} *${{ inputs.domain }}* deployed to prod | ${{ github.sha }}"
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
