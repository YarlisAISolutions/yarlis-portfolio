# ============================================================
# DETAILED DOMAIN REGISTRY
# ============================================================
domains:
  # ============================================================
  # PARENT COMPANY
  # ============================================================
  - domain: yarlis.com
    product: Yarlis Core
    description: Parent holding company, brand, enterprise AI services
    repo: https://github.com/siri1410/yarlis-platform
    status: build
    category: platform
    monetization: subscription
    moat: brand, distribution, customer_data
    stack:
      - Next.js 15
      - Firebase
      - Stripe
    urls:
      production: https://yarlis.com
      staging: https://yarlis-com-staging.web.app
      landing: https://yarlis-platform.web.app
      docs: https://docs.yarlis.com
      console: https://console.firebase.google.com/project/yarlis-platform

  # ============================================================
  # AI PLATFORM
  # ============================================================
  - domain: yarlis.ai
    product: Yarlis AI
    description: AI-first SaaS layer, agentic systems, model abstraction
    repo: https://github.com/siri1410/yarlis-platform
    status: beta
    category: ai
    monetization: enterprise
    moat: workflows, integrations, agent_orchestration
    stack:
      - Next.js 15
      - LangChain
      - Firebase
      - Cloud Run
    urls:
      production: https://yarlis.ai
      staging: https://yarlis-ai-staging.web.app
      mission_control: https://yarlis-ai-staging.web.app/mission-control
      docs: https://docs.yarlis.ai
      console: https://console.firebase.google.com/project/yarlis-platform

  # ============================================================
  # NO-CODE CHATBOT BUILDER
  # ============================================================
  - domain: mybotbox.com
    product: MyBotBox
    description: No-code AI chatbot builder, multi-tenant SaaS
    repo: https://github.com/siri1410/ystudio
    status: maintenance
    category: product
    monetization: saas
    moat: templates, multi_tenant, workflow_lockin
    stack:
      - Next.js 15
      - Firebase
      - LangChain
      - n8n-style engine
    urls:
      production: https://mybotbox.com
      firebase: https://mybotbox-prod.web.app
      staging: https://mybotbox-staging.web.app
      login: https://mybotbox.com/login
      signup: https://mybotbox.com/signup
      pricing: https://mybotbox.com/pricing
      console: https://console.firebase.google.com/project/mybotbox-prod
      cloud_run: https://console.cloud.google.com/run/detail/us-central1/mybotbox-app/metrics?project=mybotbox-prod

  # ============================================================
  # DEVELOPER FRAMEWORK
  # ============================================================
  - domain: sdods.com
    product: SDODS
    description: Developer framework ecosystem, reusable OSS components
    repo: https://github.com/siri1410/sdods
    status: published
    category: platform
    monetization: open_core
    moat: ecosystem_gravity, developer_community
    stack:
      - TypeScript
      - React
      - NestJS
    modules:
      - "@sdods/core"
      - "@sdods/auth"
      - "@sdods/ui"
      - "@sdods/observability"
    urls:
      production: https://sdods.com
      npm_org: https://npmjs.com/org/sdods
      npm_core: https://npmjs.com/package/@sdods/core
      npm_auth: https://npmjs.com/package/@sdods/auth
      npm_ui: https://npmjs.com/package/@sdods/ui
      npm_observability: https://npmjs.com/package/@sdods/observability
      github: https://github.com/siri1410/sdods

  # ============================================================
  # INFRASTRUCTURE CONTROL PLANE
  # ============================================================
  - domain: yarlis.io
    product: Yarlis IO
    description: Infrastructure control plane, health monitoring dashboard
    repo: https://github.com/siri1410/yarlis-platform
    status: beta
    category: infrastructure
    monetization: internal
    moat: speed, platform_primitives
    stack:
      - Next.js 15
      - Static Export
      - Health Checks
    urls:
      production: https://yarlis.io
      staging: https://yarlis-io-staging.web.app
      health_dashboard: https://yarlis-io-staging.web.app
      console: https://console.firebase.google.com/project/yarlis-platform

  # ============================================================
  # AI TRIAGE PLATFORM
  # ============================================================
  - domain: rapidtriage.me
    product: SmartRapidTriage
    description: IT/Software/Healthcare AI triage and prioritization
    repo: https://github.com/siri1410/smartrapidtriage
    status: live
    category: healthcare
    monetization: per_seat
    moat: workflow_lockin, data_flywheel
    stack:
      - Next.js 15
      - Firebase
      - LangChain
      - Playwright
    urls:
      production: https://rapidtriage.me
      staging: https://rapidtriage-me.web.app
      health: https://rapidtriage.me/api/health
      console: https://console.firebase.google.com/project/rapidtriage-me
