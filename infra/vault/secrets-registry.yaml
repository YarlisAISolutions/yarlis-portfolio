# ============================================================
# Yarlis Vault — Secret Registry
# Single source of truth for ALL secrets across all domains
# Actual values live in GCP Secret Manager
# This file: documents what exists + who can access it
# ============================================================

version: "1.0"
project: yarlis-platform
secret_manager_project: yarlis-platform

secrets:
  # ── Shared (all domains) ────────────────────────────────
  - id: ypid_all_prod_npm-token
    name: npm Automation Token
    description: npm publish token for @sdods/*, @yarlisai/*, @rapidtriageme/*
    domains: [all]
    env: prod
    rotation: manual
    access:
      - service-account: github-actions-all@yarlis-platform.iam.gserviceaccount.com

  - id: ypid_all_prod_cloudflare-token
    name: Cloudflare DNS + Tunnel Token
    description: Cloudflare API token with DNS:Edit + Argo Tunnel:Edit
    domains: [all]
    env: prod
    rotation: 90d
    access:
      - service-account: github-actions-all@yarlis-platform.iam.gserviceaccount.com

  - id: ypid_all_prod_github-token
    name: GitHub PAT
    description: GitHub personal access token for repo access
    domains: [all]
    env: prod
    rotation: 90d

  # ── rapidtriage.me ──────────────────────────────────────
  - id: ypid_rtm_prod_firebase-token
    name: Firebase CI Token (prod)
    description: firebase login:ci token for rapidtriage-me project
    domains: [rtm]
    env: prod
    rotation: 180d
    access:
      - service-account: github-actions-rtm@yarlis-platform.iam.gserviceaccount.com

  - id: ypid_rtm_staging_firebase-token
    name: Firebase CI Token (staging)
    description: firebase login:ci token for rapidtriage-me staging channel
    domains: [rtm]
    env: staging
    rotation: 180d

  - id: ypid_rtm_prod_anthropic-api-key
    name: Anthropic API Key (rapidtriage prod)
    description: Anthropic API key for RapidTriageME AI features
    domains: [rtm]
    env: prod
    rotation: manual

  - id: ypid_rtm_prod_stripe-secret-key
    name: Stripe Secret Key (prod)
    domains: [rtm]
    env: prod
    rotation: manual

  - id: ypid_rtm_staging_stripe-secret-key
    name: Stripe Secret Key (staging/test)
    domains: [rtm]
    env: staging
    rotation: manual

  - id: ypid_rtm_prod_rapidtriage-api-token
    name: RapidTriageME API Token
    description: Master API token for MCP auth
    domains: [rtm]
    env: prod
    rotation: 90d

  # ── mybotbox.com ─────────────────────────────────────────
  - id: ypid_mbx_prod_firebase-token
    name: Firebase CI Token (mybotbox prod)
    domains: [mbx]
    env: prod
    rotation: 180d

  - id: ypid_mbx_prod_stripe-secret-key
    name: Stripe Secret Key (mybotbox prod)
    domains: [mbx]
    env: prod
    rotation: manual

  - id: ypid_mbx_prod_openai-api-key
    name: OpenAI API Key (mybotbox)
    domains: [mbx]
    env: prod
    rotation: manual

  # ── yarlis.ai ────────────────────────────────────────────
  - id: ypid_yai_prod_anthropic-api-key
    name: Anthropic API Key (yarlis.ai)
    domains: [yai]
    env: prod
    rotation: manual

  - id: ypid_yai_prod_openai-api-key
    name: OpenAI API Key (yarlis.ai)
    domains: [yai]
    env: prod
    rotation: manual

  - id: ypid_yai_prod_google-ai-key
    name: Google AI API Key (yarlis.ai)
    domains: [yai]
    env: prod
    rotation: manual

  # ── Jenkins / CI infra ───────────────────────────────────
  - id: ypid_all_prod_google-oauth-client-id
    name: Google OAuth Client ID (Jenkins SSO)
    domains: [all]
    env: prod
    rotation: manual

  - id: ypid_all_prod_google-oauth-client-secret
    name: Google OAuth Client Secret (Jenkins SSO)
    domains: [all]
    env: prod
    rotation: manual

  - id: ypid_all_prod_telegram-bot-token
    name: Telegram Bot Token (DEEJR notifications)
    domains: [all]
    env: prod
    rotation: manual
